<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaef/layout"
      layout:decorate="~{layout/basic.html}"
>
<div layout:fragment="content">
    <div class="row mt-3">

        <div class="col">
            <div class="card">
                <div class="card-header">
                    게시판
                </div>
            </div>
            <div class="card-body">

                <form name="frmRegist" id="frmRegist" action="/board/regist" method="post">
                    <div class="input-group mb-3">
                        <span class="input-group-text">제목</span>
                        <input type="text" name="title" class="form-control" th:value="${dto.title}" />
                    </div>

                    <div class="input-group mb-3">
                        <span class="input-group-text">내용</span>
                        <textarea name="content" class="form-control col-sm-5" rows="5" readonly>[[${dto.content}]]</textarea>
                    </div>

                    <div class="input-group mb-3">
                        <span class="input-group-text">작성자</span>
                        <input type="text" name="user_id" class="form-control" th:value="${dto.user_id}" />
                    </div>

                    <div class="input-group mb-3">
                        <span class="input-group-text">노출일자</span>
                        <input type="text" name="display_date" class="form-control" th:value="${dto.display_date}" />
                    </div>

                    <div class="input-group mb-3">
                        <span class="input-group-text">수정일</span>
                        <input type="text" name="modify_date" class="form-control" th:value="${dto.modify_date}" />
                    </div>
                    <div class="my-4">
                        <div class="float-end" th:with="link=${pageRequestDTO.getLinkParams()}">
                            <button type="submit" class="btn btn-primary registBtn">등록</button>
                            <button type="button" class="btn btn-secondary cancelBtn">취소</button>
                        </div>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
